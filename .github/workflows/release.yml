name: Build and Release Bundles

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Make create_bundles.sh executable
        run: chmod +x ./create_bundles.sh
      
      - name: Run bundle creation script
        run: ./create_bundles.sh
      
      - name: Upload bundle files to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in ./*.bbsflmt; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              gh release upload ${{ github.event.release.tag_name }} "$file" --clobber
            fi
          done
