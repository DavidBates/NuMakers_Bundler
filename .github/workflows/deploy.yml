name: Build and Deploy

on:
  push:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-bundles:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Make create_bundles.sh executable
        run: chmod +x ./create_bundles.sh
      
      - name: Run bundle creation script
        run: ./create_bundles.sh
      
      - name: Upload bundles to release (if release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ./*.bbsflmt
      
      - name: Upload bundle artifacts for site deployment
        uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: ./*.bbsflmt
          retention-days: 1

  build-site:
    runs-on: ubuntu-latest
    needs: build-bundles
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json
      
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          name: bundles
          path: .
      
      - name: Copy profile files to docs/public
        run: |
          mkdir -p docs/public
          for dir in Numakers*/; do
            dir_name="${dir%/}"
            if [ -d "$dir_name/Numakers" ]; then
              mkdir -p "docs/public/$dir_name/Numakers"
              cp "$dir_name/Numakers/"*.json "docs/public/$dir_name/Numakers/" 2>/dev/null || true
            fi
          done
      
      - name: Install dependencies
        run: cd docs && npm ci
      
      - name: Generate profile data
        run: node generate_bundle_data.js
      
      - name: Build site
        run: cd docs && npm run build
      
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy-site:
    runs-on: ubuntu-latest
    needs: build-site
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
